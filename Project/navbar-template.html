<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar & Credit Template — Eksponen</title>
  <!--
    Template referensi: navbar dan credit section
    Digunakan sebagai acuan markup untuk index.html dan latihan.html

    Struktur kelas yang dipakai:
      Navbar  : .navbar > .navbar-brand + ul.nav-links > li > a.nav-link[.active]
      Credit  : footer.credit-section > p > strong

    Req yang dipenuhi:
      1.1  Navbar di paling atas setiap halaman
      1.2  Teks tautan "Beranda" → index.html
      1.3  Teks tautan "Latihan Soal" → latihan.html
      1.4  Retro style: bg gelap, border-bottom kuning ≥ 2px  (dari style.css)
      1.6  Class "active" pada "Beranda" saat di index.html
      1.7  Class "active" pada "Latihan Soal" saat di latihan.html
      1.8  Brand "Eksponen" di paling kiri navbar
      7.1  Credit section di paling bawah setiap halaman
      7.2  Nama pembuat ditampilkan secara eksplisit
      7.3  Tahun dalam format 4 digit (2025)
      7.4  Retro style: border-top ≥ 3px, font monospace  (dari style.css)
  -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============================================================
       NAVBAR
       Catatan: Tambahkan class "active" pada tautan yang sesuai
       dengan halaman aktif saat ini.
         - index.html   → class="nav-link active" pada tautan "Beranda"
         - latihan.html → class="nav-link active" pada tautan "Latihan Soal"
       ============================================================ -->
  <nav class="navbar">
    <!-- Req 1.8: Brand "Eksponen" di paling kiri -->
    <span class="navbar-brand">Eksponen</span>

    <ul class="nav-links">
      <!-- Req 1.2 & 1.6: Tautan "Beranda", active saat berada di index.html -->
      <li><a href="index.html" class="nav-link active">Beranda</a></li>

      <!-- Req 1.3 & 1.7: Tautan "Latihan Soal", active saat berada di latihan.html -->
      <li><a href="latihan.html" class="nav-link">Latihan Soal</a></li>
    </ul>
  </nav>

  <!-- ============================================================
       KONTEN UTAMA (placeholder — diganti konten nyata di tiap halaman)
       ============================================================ -->
  <main>
    <p style="color: var(--color-text-muted); text-align: center; padding: 2rem 0;">
      [ Konten halaman ditempatkan di sini ]
    </p>
  </main>

  <!-- ============================================================
       CREDIT SECTION
       Req 7.1: Di paling bawah setiap halaman, setelah semua konten
       Req 7.2: Nama pembuat eksplisit — Nabilah
       Req 7.3: Tahun 4 digit — 2025
       Req 7.4: border-top ≥ 3px + font monospace (dari .credit-section di style.css)
       ============================================================ -->
  <footer class="credit-section">
    <p>Dibuat oleh <strong>Nabilah</strong> &copy; 2025</p>
  </footer>

</body>
</html>
