<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-cyber-yellow: #f9e000;
            --color-cyber-pink: #ff2d78;
            --color-cyber-cyan: #00f5ff;
            --color-cyber-purple: #9b00ff;
            --color-cyber-dark: #0a0a0f;
            --color-cyber-dark-2: #12121a;
            --color-cyber-card: #1a1a2e;
        }

        body {
            background-color: var(--color-cyber-dark);
        }

        .glitch-text {
            text-shadow:
                2px 0 var(--color-cyber-pink),
                -2px 0 var(--color-cyber-cyan);
        }

        .cyber-card {
            border: 1px solid var(--color-cyber-cyan);
            box-shadow:
                0 0 10px var(--color-cyber-cyan),
                inset 0 0 10px rgba(0, 245, 255, 0.05);
        }

        .cyber-card-pink {
            border: 1px solid var(--color-cyber-pink);
            box-shadow:
                0 0 10px var(--color-cyber-pink),
                inset 0 0 10px rgba(255, 45, 120, 0.05);
        }

        .cyber-li::before {
            content: '▶';
            color: var(--color-cyber-yellow);
            margin-right: 0.5rem;
            text-shadow: 0 0 6px var(--color-cyber-yellow);
        }

        .cyber-li-ol::before {
            color: var(--color-cyber-pink);
            text-shadow: 0 0 6px var(--color-cyber-pink);
        }

        .scanline {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 245, 255, 0.02) 2px,
                rgba(0, 245, 255, 0.02) 4px
            );
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen font-mono text-white relative overflow-x-hidden">

    <!-- Scanline overlay -->
    <div class="scanline fixed inset-0 z-50"></div>

    <!-- Background grid -->
    <div class="fixed inset-0 opacity-10"
         style="background-image: linear-gradient(rgba(0,245,255,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.3) 1px, transparent 1px); background-size: 40px 40px;">
    </div>

    <div class="relative z-10 max-w-2xl mx-auto px-6 py-12">

        <!-- Header -->
        <div class="mb-12 text-center">
            <p class="text-xs tracking-[0.4em] text-[#9b00ff] mb-2 uppercase">System.list v2.0.77</p>
            <h1 class="text-4xl font-black uppercase tracking-widest glitch-text text-[#f9e000]">
                DATA LISTS
            </h1>
            <div class="mt-3 h-px bg-gradient-to-r from-transparent via-[#00f5ff] to-transparent"></div>
        </div>

        <!-- Unordered List Card -->
        <div class="cyber-card bg-[#1a1a2e] rounded-sm mb-8">
            <!-- Card header -->
            <div class="flex items-center gap-3 px-5 py-3 border-b border-[#00f5ff]/30 bg-[#00f5ff]/5">
                <span class="text-[#00f5ff] text-xs tracking-widest uppercase font-bold">◈ Unordered List</span>
                <span class="ml-auto text-[#00f5ff]/40 text-xs">ul_node</span>
            </div>
            <!-- Items -->
            <ul class="px-5 py-5 space-y-3 list-none">
                <li class="cyber-li flex items-center gap-3 text-[#00f5ff] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="flex-1 text-sm tracking-wide">Stroberi</span>
                    <span class="text-[#00f5ff]/20 text-xs group-hover:text-[#f9e000]/40 transition-colors">none</span>
                </li>
                <li class="cyber-li flex items-center gap-3 text-[#00f5ff] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="flex-1 text-sm tracking-wide">Mangga</span>
                    <span class="text-[#00f5ff]/20 text-xs group-hover:text-[#f9e000]/40 transition-colors">square</span>
                </li>
                <li class="cyber-li flex items-center gap-3 text-[#00f5ff] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="flex-1 text-sm tracking-wide">Appel</span>
                    <span class="text-[#00f5ff]/20 text-xs group-hover:text-[#f9e000]/40 transition-colors">disc</span>
                </li>
            </ul>
        </div>

        <!-- Ordered List Card -->
        <div class="cyber-card-pink bg-[#1a1a2e] rounded-sm mb-8">
            <!-- Card header -->
            <div class="flex items-center gap-3 px-5 py-3 border-b border-[#ff2d78]/30 bg-[#ff2d78]/5">
                <span class="text-[#ff2d78] text-xs tracking-widest uppercase font-bold">◈ Ordered List</span>
                <span class="ml-auto text-[#ff2d78]/40 text-xs">ol_node</span>
            </div>
            <!-- Items -->
            <ol class="px-5 py-5 space-y-3 list-none counter-reset-item">
                <li class="flex items-center gap-4 text-[#ff2d78] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="text-[#ff2d78] font-black text-lg w-6 text-center group-hover:text-[#f9e000] transition-colors" style="text-shadow: 0 0 8px currentColor;">01</span>
                    <span class="flex-1 text-sm tracking-wide">Bangun</span>
                </li>
                <li class="flex items-center gap-4 text-[#ff2d78] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="text-[#ff2d78] font-black text-lg w-6 text-center group-hover:text-[#f9e000] transition-colors" style="text-shadow: 0 0 8px currentColor;">02</span>
                    <span class="flex-1 text-sm tracking-wide">Makan</span>
                </li>
                <li class="flex items-center gap-4 text-[#ff2d78] hover:text-[#f9e000] transition-colors duration-200 cursor-default group">
                    <span class="text-[#ff2d78] font-black text-lg w-6 text-center group-hover:text-[#f9e000] transition-colors" style="text-shadow: 0 0 8px currentColor;">03</span>
                    <span class="flex-1 text-sm tracking-wide">Tidur</span>
                </li>
            </ol>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8">
            <p class="text-[#9b00ff]/50 text-xs tracking-widest uppercase">end of file ///</p>
        </div>

    </div>

</body>
</html>
